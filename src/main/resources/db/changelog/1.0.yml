databaseChangeLog:
  - changeSet:
      id: 1
      author: laman
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: order_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: courier_id
                  type: BIGINT
              - column:
                  name: price
                  type: NUMERIC(19,2)
              - column:
                  name: pickup_address
                  type: VARCHAR(255)
              - column:
                  name: delivery_address
                  type: VARCHAR(255)